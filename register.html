<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — ScoutIQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #09090b 0%, #17171f 100%);
      --accent: #8b5cf6;
      --accent-hover: #7c3aed;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --error-color: #ef4444;
      --success-color: #22c55e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: var(--bg-gradient);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Decorative background blur */
    .bg-shape {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 0;
      opacity: 0.5;
      animation: float 20s infinite ease-in-out alternate;
    }
    .shape-1 {
      top: -10%; left: -10%;
      width: 500px; height: 500px;
      background: #8b5cf6;
    }
    .shape-2 {
      bottom: -10%; right: -10%;
      width: 600px; height: 600px;
      background: #3b82f6;
      animation-delay: -5s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 50px) scale(1.1); }
    }

    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      background: var(--glass-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: slide-up 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slide-up {
      0% { opacity: 0; transform: translateY(40px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #8b5cf6, #3b82f6);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.4);
    }
    
    .logo-icon svg {
      color: white;
      width: 28px;
    }

    .logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.05em;
      margin-bottom: 0.25rem;
    }

    .logo-subtext {
      color: var(--text-muted);
      font-size: 0.95rem;
      font-weight: 400;
      text-align: center;
    }

    .form-group {
      margin-bottom: 1.1rem;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }

    .form-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      padding: 0.85rem 1rem;
      border-radius: 12px;
      font-size: 1rem;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-input:focus {
      border-color: var(--accent);
      background: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
    }

    .btn-login {
      width: 100%;
      padding: 1rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 1rem;
      position: relative;
      overflow: hidden;
    }

    .btn-login:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -10px rgba(139, 92, 246, 0.6);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .link-row {
      display: flex;
      justify-content: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
    }

    .link-row a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s ease;
      font-weight: 500;
      margin-left: 0.5rem;
    }

    .link-row a:hover {
      color: white;
    }

    .loader {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
      position: absolute;
      top: 50%;
      left: 50%;
      margin-top: -10px;
      margin-left: -10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .btn-text {
      transition: opacity 0.2s;
    }

    .loading .btn-text {
      opacity: 0;
    }
    .loading .loader {
      display: block;
    }
    
    .msg {
      font-size: 0.85rem;
      margin-top: 0.5rem;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .msg.error {
      color: var(--error-color);
    }
    .msg.success {
      color: var(--success-color);
    }
    .msg.show {
      opacity: 1;
    }

    #otpSection {
      display: none;
      animation: slide-up 0.4s ease-out;
    }
  </style>
</head>
<body>
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>

  <div class="login-container">
    <div class="logo-container">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h1 class="logo-text">Join ScoutIQ</h1>
      <p class="logo-subtext" id="headerSubtext">Discover winning products today</p>
    </div>

    <form id="registerForm">
      
      <!-- Registration Step -->
      <div id="registerSection">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-input" placeholder="name@company.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" required />
        </div>
      </div>

      <!-- OTP Verification Step -->
      <div id="otpSection">
        <div class="form-group">
          <label for="otpCode">Verification Code</label>
          <input type="text" id="otpCode" class="form-input" placeholder="Check your email for 6-digit code" autocomplete="off" />
        </div>
        <div style="text-align: right; margin-top: -0.5rem; margin-bottom: 1.5rem;">
          <a href="#" id="resendBtn" style="color: var(--accent); font-size: 0.85rem; text-decoration: none; font-weight: 500;">Resend Code</a>
        </div>
      </div>
      
      <div id="messageBox" class="msg"></div>
      
      <button type="submit" class="btn-login" id="submitBtn">
        <span class="btn-text" id="btnText">Create Account</span>
        <div class="loader"></div>
      </button>

      <div class="link-row" id="footerLinks">
        <span>Already have an account?</span>
        <a href="/">Sign In</a>
      </div>
    </form>
  </div>

  <script>
    let currentStep = 'register';
    
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const btn = document.getElementById('submitBtn');
      const emailObj = document.getElementById('email');
      const passwordObj = document.getElementById('password');
      const otpObj = document.getElementById('otpCode');
      const msgBox = document.getElementById('messageBox');
      const email = emailObj.value;
      const password = passwordObj.value;
      
      msgBox.classList.remove('show', 'error', 'success');
      btn.classList.add('loading');
      
      try {
        if (currentStep === 'register') {
          // STEP 1: Registration
          const response = await fetch('/api/register', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({ email, password })
          });
          
          const data = await response.json();
          
          if (response.ok && data.requires_otp) {
              // Transition to OTP View
              document.getElementById('registerSection').style.display = 'none';
              document.getElementById('footerLinks').style.display = 'none';
              document.getElementById('otpSection').style.display = 'block';
              document.getElementById('headerSubtext').textContent = 'We sent a 6-digit code to ' + email;
              document.getElementById('btnText').textContent = 'Verify Account';
              
              currentStep = 'verify';
              
              msgBox.className = 'msg success show';
              msgBox.innerHTML = "Check your email for the code!";
          } else {
              msgBox.className = 'msg error show';
              msgBox.textContent = data.error || 'Registration failed';
          }
        } 
        else if (currentStep === 'verify') {
          // STEP 2: OTP Verification
          const otpCode = otpObj.value;
          
          const response = await fetch('/api/verify-otp', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({ email, otpCode })
          });
          
          const data = await response.json();
          
          if (response.ok) {
              msgBox.className = 'msg success show';
              msgBox.textContent = 'Account verified! Logging you in...';
              
              // Auto login
              const loginResp = await fetch('/api/login', {
                  method: 'POST',
                  headers: {'Content-Type': 'application/json'},
                  body: JSON.stringify({ email, password })
              });
              
              if (loginResp.ok) {
                  window.location.href = '/dashboard';
              } else {
                  window.location.href = '/';
              }
          } else {
              msgBox.className = 'msg error show';
              msgBox.textContent = data.error || 'Invalid OTP';
          }
        }
      } catch (err) {
        msgBox.className = 'msg error show';
        msgBox.textContent = 'Network error. Please try again.';
      } finally {
        btn.classList.remove('loading');
      }
    });

    // Resend Code Logic
    document.getElementById('resendBtn').addEventListener('click', async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const msgBox = document.getElementById('messageBox');
      
      this.style.opacity = '0.5';
      this.style.pointerEvents = 'none';
      this.textContent = 'Sending...';

      try {
        const response = await fetch('/api/register', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ email, password })
        });
        
        if (response.ok) {
          msgBox.className = 'msg success show';
          msgBox.textContent = 'A new code has been sent!';
        }
      } catch (err) {
        msgBox.className = 'msg error show';
        msgBox.textContent = 'Failed to resend. Please try again.';
      } finally {
        setTimeout(() => {
          this.style.opacity = '1';
          this.style.pointerEvents = 'auto';
          this.textContent = 'Resend Code';
        }, 5000);
      }
    });
  </script>
</body>
</html>
