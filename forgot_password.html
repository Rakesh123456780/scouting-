<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — ScoutIQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-base: #07080f;
      --accent: #8b5cf6;
      --accent-hover: #7c3aed;
      --glass-bg: rgba(17, 20, 40, 0.75);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-filter: blur(24px) saturate(180%);
      --glass-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.06);
      --text-main: #f0f2f5;
      --text-muted: rgba(255, 255, 255, 0.55);
      --error-color: #ef4444;
      --success-color: #10b981;
      --gradient-primary: linear-gradient(135deg, #7c3aed 0%, #6366f1 50%, #3b82f6 100%);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: var(--bg-base);
      background-image:
        radial-gradient(ellipse 60% 50% at 5% 15%, rgba(99, 102, 241, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse 50% 40% at 90% 80%, rgba(6, 182, 212, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient Subtle Background Glows */
    .bg-shape {
      position: absolute;
      border-radius: 50%;
      filter: blur(140px);
      z-index: 0;
      opacity: 0.8;
      pointer-events: none;
    }
    .shape-1 {
      top: -20%; left: -10%;
      width: 500px; height: 500px;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.15));
      animation: ambientGlow1 30s ease-in-out infinite alternate;
    }
    .shape-2 {
      bottom: -20%; right: -10%;
      width: 600px; height: 600px;
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.15), rgba(16, 185, 129, 0.1));
      animation: ambientGlow2 25s ease-in-out infinite alternate;
    }

    @keyframes ambientGlow1 {
      0% { transform: translate(0, 0); opacity: 0.7; }
      100% { transform: translate(50px, 30px); opacity: 1; }
    }
    @keyframes ambientGlow2 {
      0% { transform: translate(0, 0); opacity: 0.7; }
      100% { transform: translate(-30px, -40px); opacity: 1; }
    }

    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-filter);
      -webkit-backdrop-filter: var(--glass-filter);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 3.5rem 3rem;
      box-shadow: var(--glass-shadow);
      animation: slide-up 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      overflow: hidden;
    }

    /* Top highlight shine */
    .login-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.2) 50%, transparent 100%);
    }

    @keyframes slide-up {
      0% { opacity: 0; transform: translateY(40px) scale(0.97); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2rem;
      position: relative;
      z-index: 1;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      background: var(--gradient-primary);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      box-shadow: 0 6px 16px rgba(99, 102, 241, 0.3);
    }
    
    .logo-icon svg {
      color: white;
      width: 28px;
    }

    .logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.05em;
      margin-bottom: 0.25rem;
      background: linear-gradient(135deg, #8b5cf6 0%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-subtext {
      color: var(--text-muted);
      font-size: 0.95rem;
      font-weight: 400;
      text-align: center;
    }

    .form-group {
      margin-bottom: 1.1rem;
      position: relative;
      z-index: 1;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }

    .form-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-main);
      padding: 0.85rem 1rem;
      border-radius: 12px;
      font-size: 1rem;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-input:focus {
      border-color: rgba(99, 102, 241, 0.5);
      background: rgba(0, 0, 0, 0.3);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    .btn-login {
      width: 100%;
      padding: 1rem;
      background: var(--gradient-primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 1rem;
      position: relative;
      overflow: hidden;
      z-index: 1;
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.45);
      filter: brightness(1.1);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .link-row {
      display: flex;
      justify-content: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      position: relative;
      z-index: 1;
    }

    .link-row a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s ease;
      font-weight: 500;
      margin-left: 0.5rem;
    }

    .link-row a:hover {
      color: white;
    }

    .loader {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
      position: absolute;
      top: 50%;
      left: 50%;
      margin-top: -10px;
      margin-left: -10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .btn-text {
      transition: opacity 0.2s;
    }

    .loading .btn-text {
      opacity: 0;
    }
    .loading .loader {
      display: block;
    }
    
    .msg {
      font-size: 0.85rem;
      margin-top: 0.5rem;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s;
      position: relative;
      z-index: 1;
    }
    .msg.error {
      color: var(--error-color);
    }
    .msg.success {
      color: var(--success-color);
    }
    .msg.show {
      opacity: 1;
    }

    #resetSection {
      display: none;
      animation: slide-up 0.4s ease-out;
    }
  </style>
</head>
<body>
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>
  <div class="bg-shape shape-3"></div>

  <div class="login-container">
    <div class="logo-container">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h1 class="logo-text">Reset Password</h1>
      <p class="logo-subtext" id="headerSubtext">Enter your email to receive an OTP</p>
    </div>

    <form id="forgotForm">
      
      <!-- Request OTP Step -->
      <div id="requestSection">
        <div class="form-group">
          <label for="email">Account Email</label>
          <input type="email" id="email" class="form-input" placeholder="name@company.com" required />
        </div>
      </div>

      <!-- Reset Password Step -->
      <div id="resetSection">
        <div class="form-group">
          <label for="otpCode">OTP Verification Code</label>
          <input type="text" id="otpCode" class="form-input" placeholder="Check your email for 6-digit code" autocomplete="off" />
        </div>
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" class="form-input" placeholder="••••••••" />
        </div>
      </div>
      
      <div id="messageBox" class="msg"></div>
      
      <button type="submit" class="btn-login" id="submitBtn">
        <span class="btn-text" id="btnText">Send OTP</span>
        <div class="loader"></div>
      </button>

      <div class="link-row" id="footerLinks">
        <a href="/">Wait, I remember it! Sign In</a>
      </div>
    </form>
  </div>

  <script>
    let currentStep = 'request';
    
    document.getElementById('forgotForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const btn = document.getElementById('submitBtn');
      const emailObj = document.getElementById('email');
      const otpObj = document.getElementById('otpCode');
      const newPasswordObj = document.getElementById('newPassword');
      const msgBox = document.getElementById('messageBox');
      
      const email = emailObj.value;
      const otpCode = otpObj.value;
      const newPassword = newPasswordObj.value;
      
      msgBox.classList.remove('show', 'error', 'success');
      btn.classList.add('loading');
      
      try {
        if (currentStep === 'request') {
          // STEP 1: Request OTP
          const response = await fetch('/api/forgot-password/request-otp', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({ email })
          });
          
          const data = await response.json();
          
          if (response.ok) {
              // Transition to Reset View
              document.getElementById('requestSection').style.display = 'none';
              document.getElementById('resetSection').style.display = 'block';
              document.getElementById('headerSubtext').textContent = 'Enter the OTP sent to ' + email;
              document.getElementById('btnText').textContent = 'Reset Password';
              newPasswordObj.setAttribute('required', 'true');
              otpObj.setAttribute('required', 'true');
              
              currentStep = 'reset';
              
              msgBox.className = 'msg success show';
              msgBox.innerHTML = "Check your email for the code!";
          } else {
              msgBox.className = 'msg error show';
              msgBox.textContent = data.error || 'Request failed';
          }
        } 
        else if (currentStep === 'reset') {
          // STEP 2: Submit new password with OTP
          const response = await fetch('/api/forgot-password/reset', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({ email, otpCode, newPassword })
          });
          
          const data = await response.json();
          
          if (response.ok) {
              msgBox.className = 'msg success show';
              msgBox.textContent = 'Password reset successfully! Redirecting to login...';
              
              setTimeout(() => {
                window.location.href = '/';
              }, 1500);
          } else {
              msgBox.className = 'msg error show';
              msgBox.textContent = data.error || 'Invalid OTP';
          }
        }
      } catch (err) {
        msgBox.className = 'msg error show';
        msgBox.textContent = 'Network error. Please try again.';
      } finally {
        btn.classList.remove('loading');
      }
    });
  </script>
</body>
</html>
