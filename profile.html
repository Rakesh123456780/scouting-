<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScoutIQ — My Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #07080f;
            --bg-card: rgba(17, 20, 40, 0.75);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f0f2f5;
            --text-muted: rgba(255, 255, 255, 0.55);
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #10b981;
            --glass-filter: blur(24px) saturate(180%);
            --glass-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.06);
            --gradient-primary: linear-gradient(135deg, #7c3aed 0%, #6366f1 50%, #3b82f6 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: var(--bg-base);
            background-image:
                radial-gradient(ellipse 60% 50% at 5% 15%, rgba(99, 102, 241, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse 50% 40% at 90% 80%, rgba(6, 182, 212, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse 40% 30% at 50% 50%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .bg-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(140px);
            z-index: 0;
            opacity: 0.8;
            pointer-events: none;
        }
        .shape-1 {
            top: -20%; left: -10%;
            width: 500px; height: 500px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.15));
            animation: ambientGlow1 30s ease-in-out infinite alternate;
        }
        .shape-2 {
            bottom: -20%; right: -10%;
            width: 600px; height: 600px;
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.15), rgba(16, 185, 129, 0.1));
            animation: ambientGlow2 25s ease-in-out infinite alternate;
        }

        @keyframes ambientGlow1 {
            0% { transform: translate(0, 0); opacity: 0.7; }
            100% { transform: translate(50px, 30px); opacity: 1; }
        }
        @keyframes ambientGlow2 {
            0% { transform: translate(0, 0); opacity: 0.7; }
            100% { transform: translate(-30px, -40px); opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            background: var(--bg-card);
            backdrop-filter: var(--glass-filter);
            -webkit-backdrop-filter: var(--glass-filter);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 2.5rem;
            box-shadow: var(--glass-shadow);
            animation: slide-up 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.2) 50%, transparent 100%);
        }

        @keyframes slide-up {
            0% { opacity: 0; transform: translateY(40px) scale(0.97); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
            position: relative;
            z-index: 1;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .header a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .header a:hover {
            color: var(--text-main);
        }

        .form-group {
            margin-bottom: 1.25rem;
            position: relative;
            z-index: 1;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 0.85rem 1rem;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: rgba(99, 102, 241, 0.5);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .form-input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: rgba(0, 0, 0, 0.4);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
            position: relative;
            z-index: 1;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.45);
            filter: brightness(1.1);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
            margin-top: 1rem;
        }
        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.25);
            transform: translateY(-2px);
        }
        
        .btn-reset {
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-main);
            border: 1px solid var(--border);
            text-decoration: none;
            display: inline-block;
            text-align: center;
            margin-top: 1rem;
            z-index: 1;
            position: relative;
        }
        .btn-reset:hover {
            background: rgba(0, 0, 0, 0.4);
            border-color: rgba(255,255,255,0.2);
        }

        .msg {
            font-size: 0.85rem;
            margin-top: 0.5rem;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s;
            position: relative;
            z-index: 1;
        }
        .msg.success { color: var(--success); }
        .msg.error { color: var(--danger); }
        .msg.show { opacity: 1; }

        .metadata {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            position: relative;
            z-index: 1;
        }

        .badge {
            padding: 0.2rem 0.5rem;
            border-radius: 99px;
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
            font-weight: 600;
            font-size: 0.75rem;
        }

        .loader {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .loading .btn-text { display: none; }
        .loading .loader { display: block; }
    </style>
</head>
<body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <div class="container">
        <div class="header">
            <h1>My Profile</h1>
            <a href="/dashboard">Back to App</a>
        </div>

        <form id="profileForm">
            <div class="form-group">
                <label>Email Address <span class="badge" id="verificationBadge">Verified</span></label>
                <input type="email" id="email" class="form-input" disabled />
            </div>

            <div class="form-group">
                <label>Mobile Number (Optional)</label>
                <input type="tel" id="mobile" class="form-input" placeholder="+1 (555) 000-0000" />
            </div>

            <div id="msgBox" class="msg"></div>

            <button type="submit" class="btn btn-primary" id="saveBtn">
                <span class="btn-text">Save Changes</span>
                <div class="loader"></div>
            </button>
            
            <a href="/forgot-password" class="btn btn-reset">Change Password</a>

            <button type="button" class="btn btn-danger" id="logoutBtn">Logout</button>
        </form>

        <div class="metadata">
            <span>Account ID: <span id="accountId">--</span></span>
            <span>Joined: <span id="joinDate">--</span></span>
        </div>
    </div>

    <script>
        // Fetch Profile Data on Load
        async function loadProfile() {
            try {
                const res = await fetch('/api/profile');
                if (!res.ok) {
                    window.location.href = '/';
                    return;
                }
                const data = await res.json();
                
                document.getElementById('email').value = data.email;
                document.getElementById('mobile').value = data.phone_number || '';
                document.getElementById('accountId').textContent = '#' + data.id;
                
                const date = new Date(data.created_at + "Z");
                document.getElementById('joinDate').textContent = date.toLocaleDateString();

                if (!data.is_verified) {
                    const badge = document.getElementById('verificationBadge');
                    badge.textContent = 'Unverified';
                    badge.style.background = 'rgba(239, 68, 68, 0.2)';
                    badge.style.color = 'var(--danger)';
                }
            } catch (e) {
                console.error("Error fetching profile", e);
            }
        }

        loadProfile();

        // Handle Save
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            const mobile = document.getElementById('mobile').value;
            const msgBox = document.getElementById('msgBox');

            btn.classList.add('loading');
            msgBox.className = 'msg';

            try {
                const res = await fetch('/api/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone_number: mobile })
                });

                if (res.ok) {
                    msgBox.textContent = 'Profile updated successfully!';
                    msgBox.classList.add('success', 'show');
                } else {
                    msgBox.textContent = 'Failed to update profile.';
                    msgBox.classList.add('error', 'show');
                }
            } catch (e) {
                msgBox.textContent = 'Network error.';
                msgBox.classList.add('error', 'show');
            } finally {
                btn.classList.remove('loading');
            }
        });

        // Handle Logout
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/';
            } catch (e) {
                console.error("Logout failed", e);
            }
        });
    </script>
</body>
</html>
