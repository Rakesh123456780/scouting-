<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScoutIQ — Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #07080f;
            --bg-card: rgba(17, 20, 40, 0.75);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f0f2f5;
            --text-muted: rgba(255, 255, 255, 0.55);
            --accent: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
            --glass-filter: blur(24px) saturate(180%);
            --glass-filter-light: blur(12px) saturate(160%);
            --glass-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.06);
            --gradient-primary: linear-gradient(135deg, #7c3aed 0%, #6366f1 50%, #3b82f6 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: var(--bg-base);
            background-image:
                radial-gradient(ellipse 60% 50% at 5% 15%, rgba(99, 102, 241, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse 50% 40% at 90% 80%, rgba(6, 182, 212, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse 40% 30% at 50% 50%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            padding: 2rem;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient Subtle Background Glows */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
            filter: blur(140px);
            opacity: 0.8;
        }
        body::before {
            width: 500px; height: 500px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.15));
            top: -200px; left: -150px;
            animation: ambientGlow1 30s ease-in-out infinite alternate;
        }
        body::after {
            width: 600px; height: 600px;
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.15), rgba(16, 185, 129, 0.1));
            bottom: -150px; right: -100px;
            animation: ambientGlow2 25s ease-in-out infinite alternate;
        }

        @keyframes ambientGlow1 {
            0% { transform: translate(0, 0); opacity: 0.7; }
            100% { transform: translate(60px, 40px); opacity: 1; }
        }
        @keyframes ambientGlow2 {
            0% { transform: translate(0, 0); opacity: 0.7; }
            100% { transform: translate(-40px, -30px); opacity: 1; }
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            position: relative;
            z-index: 1;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .header h1 svg {
            color: var(--accent);
            width: 28px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            position: relative;
            z-index: 1;
        }
        
        @media (max-width: 1024px) {
            .container { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: var(--glass-filter-light);
            -webkit-backdrop-filter: var(--glass-filter-light);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            padding-top: 1rem;
            height: fit-content;
            box-shadow: var(--glass-shadow);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.2) 50%, transparent 100%);
        }

        .card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: var(--text-main);
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
            position: relative;
            z-index: 1;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            position: relative;
            z-index: 1;
        }

        th {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.85rem;
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 0.75rem;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            vertical-align: middle;
        }

        .badge {
            padding: 0.25rem 0.5rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
            backdrop-filter: blur(6px);
        }

        .badge.verified {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .badge.unverified {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-style: italic;
            font-size: 0.9rem;
        }
        
        .timestamp {
            color: var(--text-muted);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>
            <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Admin Command Center
        </h1>
        <a href="/" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">Back to App</a>
    </div>

    <div class="container">
        <!-- Users Table -->
        <div class="card">
            <h2>Account Registry</h2>
            <table id="usersTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Created At</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="4" class="empty-state">Loading users...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Activity Log Table -->
        <div class="card">
            <h2>Live Activity Stream</h2>
            <table id="activityTable">
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Action</th>
                        <th>Timestamp</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="3" class="empty-state">Loading activity logs...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function formatDate(dateStr) {
            const date = new Date(dateStr + "Z"); // SQLite gives UTC
            return date.toLocaleString();
        }

        async function fetchAdminData() {
            try {
                // Fetch Users
                const userRes = await fetch('/api/admin/users');
                const users = await userRes.json();
                const uBody = document.querySelector('#usersTable tbody');
                
                if(users.length === 0) {
                    uBody.innerHTML = '<tr><td colspan="4" class="empty-state">No users registered yet.</td></tr>';
                } else {
                    uBody.innerHTML = users.map(u => `
                        <tr>
                            <td class="timestamp">#${u.id}</td>
                            <td style="font-weight:500">${u.email}</td>
                            <td><span class="badge ${u.is_verified ? 'verified' : 'unverified'}">${u.is_verified ? 'Verified' : 'Unverified'}</span></td>
                            <td class="timestamp">${formatDate(u.created_at)}</td>
                        </tr>
                    `).join('');
                }

                // Fetch Activities
                const actRes = await fetch('/api/admin/activities');
                const activities = await actRes.json();
                const aBody = document.querySelector('#activityTable tbody');
                
                if(activities.length === 0) {
                    aBody.innerHTML = '<tr><td colspan="3" class="empty-state">No activities recorded yet.</td></tr>';
                } else {
                    aBody.innerHTML = activities.map(a => `
                        <tr>
                            <td style="font-weight:500; color:var(--text-muted);">${a.user_email}</td>
                            <td>
                                <div>${a.action}</div>
                                ${a.details ? `<div style="font-size:0.75rem; color:var(--text-muted); margin-top:0.25rem">${a.details}</div>` : ''}
                            </td>
                            <td class="timestamp">${formatDate(a.timestamp)}</td>
                        </tr>
                    `).join('');
                }

            } catch(e) {
                console.error("Failed to fetch admin data", e);
            }
        }

        fetchAdminData();
        // Refresh every 5 seconds for a "Live Stream" feel
        setInterval(fetchAdminData, 5000);
    </script>
</body>
</html>
